name: Auto-versioning
permissions: write-all

on:
  push:
    branches:
      - tiny
  workflow_dispatch:

jobs:
  version:
    name: Calculate next ScalVer and release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      sha: ${{ steps.sha.outputs.SHA }}

    steps:
      - name: Checkout (tiny branch)
        uses: actions/checkout@v4
        with:
          ref: tiny
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version (ScalVer)
        id: version
        run: |
          CURRENT_VERSION=$(cat .version 2>/dev/null || echo "3.20000101.0")
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          CURRENT_DATE=$(echo $CURRENT_VERSION | cut -d. -f2)
          CURRENT_PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          TODAY=$(date +%Y%m%d)

          if [ "$CURRENT_DATE" = "$TODAY" ]; then
            NEXT_PATCH=$((CURRENT_PATCH + 1))
            NEXT_VERSION="${MAJOR}.${TODAY}.${NEXT_PATCH}"
          else
            NEXT_VERSION="${MAJOR}.${TODAY}.0"
          fi

          echo "VERSION=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT_VERSION -> Next: v$NEXT_VERSION"

      - name: Update version file
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "$VERSION" > .version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .version
          if ! git diff --cached --quiet; then
            git commit -m "chore: release v$VERSION"
            git push origin tiny
          fi

      - name: Output release commit SHA
        id: sha
        run: echo "SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          gh release create "v$VERSION" \
            --title="v$VERSION" \
            --notes="ScalVer release v$VERSION" \
            --latest=true \
            --target=tiny
